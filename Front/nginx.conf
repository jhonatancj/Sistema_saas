# Sirve la SPA para cualquier subdominio (server_name comodín) — la
# resolución de tenant es 100% client-side (TenantService lee
# window.location.hostname), nginx no necesita saber nada de tenants.
server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  location / {
    # Fallback de SPA: cualquier ruta que no sea un archivo real cae a
    # index.html (Angular Router resuelve del lado del cliente).
    try_files $uri $uri/ /index.html;
  }

  # Assets con hash en el nombre (main.<hash>.js, etc.) — cacheables largo.
  location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
