<header class="topbar">

  <!-- Hamburger (solo mobile) -->
  <button class="topbar__hamburger" (click)="layout.toggleMobile()" aria-label="Abrir menú">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
  </button>

  <!-- Breadcrumb -->
  <nav class="topbar__breadcrumb" aria-label="Breadcrumb">
    @for (crumb of crumbs(); track crumb.label; let last = $last) {
      @if (last) {
        <span class="topbar__crumb topbar__crumb--current">{{ crumb.label }}</span>
      } @else {
        <a class="topbar__crumb" [routerLink]="crumb.route">{{ crumb.label }}</a>
        <span class="topbar__sep" aria-hidden="true">›</span>
      }
    }
  </nav>

  <div class="topbar__right">

    <!-- Search -->
    <div class="topbar__search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
        <circle cx="11" cy="11" r="8"/>
        <path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
      </svg>
      <input #searchInput type="text" class="topbar__search-input" placeholder="Buscar..." aria-label="Buscar"/>
      <kbd class="topbar__kbd">⌘K</kbd>
    </div>

    <!-- Notifications -->
    <button class="topbar__btn" title="Notificaciones" aria-label="Notificaciones">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
      </svg>
      @if (notificationCount() > 0) {
        <span class="topbar__badge">{{ notificationCount() }}</span>
      }
    </button>

    <!-- User Menu -->
    <div class="topbar__user">
      <button class="topbar__user-btn" (click)="toggleUserMenu()" aria-label="Menú de usuario">
        <div class="topbar__avatar">UP</div>
        <span class="topbar__username">U. Principal</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>

      @if (showUserMenu()) {
        <div class="topbar__dropdown" role="menu">
          <button class="topbar__dropdown-item" role="menuitem" (click)="logout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="15" height="15">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
            Cerrar sesión
          </button>
        </div>
      }
    </div>

  </div>
</header>
